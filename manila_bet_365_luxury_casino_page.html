<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ManilaBet365 - Luxury Casino</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }

    body {
      background: #000;
      color: #fff;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px;
      background: #111;
      border-bottom: 1px solid gold;
    }

    header h1 {
      color: gold;
    }

    nav a {
      margin-left: 20px;
      text-decoration: none;
      color: #fff;
      transition: 0.3s;
    }

    nav a:hover { color: gold; }

    .hero {
      height: 80vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)), url('https://images.unsplash.com/photo-1601597111158-2fceff292cdc');
      background-size: cover;
    }

    .hero h2 {
      font-size: 3rem;
      color: gold;
      margin-bottom: 20px;
    }

    .hero button {
      padding: 15px 30px;
      font-size: 1.2rem;
      background: gold;
      border: none;
      cursor: pointer;
      border-radius: 5px;
      transition: 0.3s;
    }

    .hero button:hover {
      background: #fff;
      color: #000;
    }

    .section {
      padding: 50px 20px;
      text-align: center;
    }

    .section h2 {
      color: gold;
      margin-bottom: 30px;
    }

    .games {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }

    .game-card {
      background: #111;
      padding: 20px;
      border-radius: 10px;
      border: 1px solid gold;
      transition: transform 0.3s;
    }

    .game-card:hover {
      transform: scale(1.05);
    }

    .crypto {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
    }

    .crypto div {
      background: #111;
      padding: 15px 25px;
      border: 1px solid gold;
      border-radius: 8px;
    }

    footer {
      text-align: center;
      padding: 20px;
      border-top: 1px solid gold;
      background: #111;
    }

    @media (max-width: 768px) {
      .hero h2 { font-size: 2rem; }
    }
  </style>
</head>
<body>

<header>
  <h1>ManilaBet365</h1>
  <nav>
    <a href="#games">Games</a>
    <a href="#crypto">Crypto</a>
    <a href="#join">Join</a>
  </nav>
</header>

<section class="hero">
  <h2>Experience Luxury Gaming</h2>
  <button onclick="joinNow()">Join Now</button>
</section>

<section id="games" class="section">
  <h2>Popular Games</h2>
  <div class="games">
    <div class="game-card">🎰 Slot Machine</div>
    <div class="game-card">🎡 Roulette</div>
    <div class="game-card">🃏 Blackjack</div>
    <div class="game-card">🎲 Dice</div>
  </div>
</section>

<section id="crypto" class="section">
  <h2>Crypto Deposit</h2>
  <div class="crypto">
    <div>₿ Bitcoin</div>
    <div>Ξ Ethereum</div>
    <div>USDT (TRC20)</div>
    <div>Litecoin</div>
  </div>
</section>

<footer>
  <p>© 2026 ManilaBet365. All rights reserved.</p>
</footer>

<script>
  function joinNow() {
    alert("Welcome to ManilaBet365! Sign up feature coming soon.");
  }
</script>

</body>
</html>
